version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: library_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-libraryAdmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-libraryAdmin123}
      POSTGRES_DB: ${POSTGRES_DB:-BookReservation}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-library_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      HTTP_HOST: ${HTTP_HOST:-0.0.0.0}
      HTTP_PORT: ${HTTP_PORT:-3000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-libraryAdmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-libraryAdmin123}
      POSTGRES_DB: ${POSTGRES_DB:-BookReservation}
      JWT_SECRET: ${JWT_SECRET:-4%iFf$KX1#PrmEOM^^U)n:6_]^*|6&!*qR8t*SF3snN^UebjV#%_AlgP2Aj)&(txJWT_EXPIRES_IN=7d_min_32_characters}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/usr/src/app/uploads

volumes:
  postgres_data: